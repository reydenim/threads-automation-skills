  <path d="M620 128C703 108 742 105 819 121" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 12" opacity="0.55"/>
  <path d="M640 210C729 199 775 205 879 230" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 12" opacity="0.45"/>
  <path d="M615 306C697 323 743 332 800 336" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 12" opacity="0.45"/>

  <text x="82" y="370" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="600">github.com/reydenim/threads-automation-skills</text>
