    <rect x="0" y="0" width="78" height="78" rx="24" fill="#F8FAFC" fill-opacity="0.08" stroke="#CBD5E1" stroke-opacity="0.16"/>
    <path d="M39 18C29.1 18 21.6 24.5 21.6 34.4C21.6 44.8 29 50.4 38.1 50.4H43.7C42.4 55.2 38.2 58.2 31.4 59.5" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
