  <text x="82" y="246" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="500">Reusable agent skills for contextual replies, visual posts, verification, and anti-AI writing polish.</text>

