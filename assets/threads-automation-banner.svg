      <text x="84" y="40" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="800">Verify before report</text>
      <text x="84" y="64" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">VERIFIED / FAILED / UNVERIFIED</text>
