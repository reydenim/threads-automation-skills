<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Threads Automation Skills banner</title>
  <desc id="desc">Dark premium banner for Threads Automation Skills, showing agent workflow cards and bilingual automation positioning.</desc>
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1070 80) rotate(139) scale(680 520)">
      <stop stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#2563EB" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(230 390) rotate(-31) scale(520 360)">
      <stop stop-color="#22C55E" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172033" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#08111F" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accent" x1="442" y1="100" x2="960" y2="325" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.52" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="38" fill="#020617"/>
